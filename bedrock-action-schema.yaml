openapi: "3.0.0"
info:
  title: ADMA Agri Show 2026 Agent API
  version: "1.0"
  description: "Live API actions for AgriBot, the ADMA Agri Show 2026 AI assistant. Event: ADMA Agri Show 2026, ART Farm, Pomona, Harare, Zimbabwe."

paths:

  /api/exhibitors:
    get:
      operationId: listExhibitors
      summary: "List all exhibitors"
      description: "Returns the exhibitor directory. Filter by sponsorship tier or by industry category."
      parameters:
        - name: tier
          in: query
          required: false
          description: "Filter by sponsorship tier. Allowed values: Platinum, Gold, Silver, Bronze"
          schema:
            type: string
            enum: [Platinum, Gold, Silver, Bronze]
        - name: category
          in: query
          required: false
          description: "Filter by industry category. Allowed values: Machinery, Irrigation, Fertilizers & Inputs, Livestock, Agri-Tech, Finance, Logistics, Security, Services"
          schema:
            type: string
            enum: [Machinery, Irrigation, "Fertilizers & Inputs", Livestock, Agri-Tech, Finance, Logistics, Security, Services]
        - name: sortBy
          in: query
          required: false
          description: "Field to sort results by. Allowed values: name, tier, booth"
          schema:
            type: string
            enum: [name, tier, booth]
      responses:
        "200":
          description: "Array of exhibitor objects"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exhibitor"

  /api/exhibitors/{id}:
    get:
      operationId: getExhibitor
      summary: "Get a single exhibitor by ID"
      description: "Returns full details for one exhibitor including booth number, section, contact info, and products."
      parameters:
        - name: id
          in: path
          required: true
          description: "The unique ID of the exhibitor"
          schema:
            type: string
      responses:
        "200":
          description: "Exhibitor object"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exhibitor"
        "404":
          description: "Exhibitor not found"

  /api/meeting-requests:
    post:
      operationId: createMeetingRequest
      summary: "Submit a meeting request"
      description: "Creates a meeting request from a visitor to an exhibitor. The exhibitor is notified by email and SMS and can confirm or decline from the exhibitor portal."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMeetingRequest"
      responses:
        "201":
          description: "Meeting request created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingRequest"
        "400":
          description: "Invalid request body"

  /api/meeting-requests/{id}:
    get:
      operationId: getMeetingRequest
      summary: "Get a meeting request by ID"
      description: "Returns the current status of a meeting request (Pending, Confirmed, Declined, or Cancelled)."
      parameters:
        - name: id
          in: path
          required: true
          description: "The unique ID of the meeting request"
          schema:
            type: string
      responses:
        "200":
          description: "Meeting request with current status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingRequest"
        "404":
          description: "Meeting request not found"

  /api/virtual-enquiries:
    post:
      operationId: submitVirtualEnquiry
      summary: "Submit an enquiry to an exhibitor"
      description: "Sends a written product or service enquiry to an exhibitor booth. The exhibitor is notified and can reply through the exhibitor portal."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewVirtualEnquiry"
      responses:
        "201":
          description: "Enquiry submitted successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualEnquiry"
        "400":
          description: "Invalid request body"

  /api/registrations/by-email:
    get:
      operationId: findRegistrationByEmail
      summary: "Find a registration by email"
      description: "Looks up a registration record by email address, returning role, ticket type, badge category, and check-in status. Returns null if no registration exists for that email — this is not an error."
      parameters:
        - name: email
          in: query
          required: true
          description: "The email address of the registrant to look up"
          schema:
            type: string
            format: email
      responses:
        "200":
          description: "Registration record, or null if none exists for this email"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /api/announcements:
    get:
      operationId: listAnnouncements
      summary: "Get event announcements"
      description: "Returns all published announcements from the organizer, sorted by most recent first. Use this to answer questions about schedule changes or event updates."
      parameters:
        - name: sortBy
          in: query
          required: false
          description: "Field to sort announcements by. Allowed values: created_date, title"
          schema:
            type: string
            enum: [created_date, title]
      responses:
        "200":
          description: "Array of announcement objects"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

components:
  schemas:

    Exhibitor:
      type: object
      properties:
        id:
          type: string
          description: "Unique exhibitor ID"
        name:
          type: string
          description: "Exhibitor company name"
        tier:
          type: string
          enum: [Platinum, Gold, Silver, Bronze]
          description: "Sponsorship / booth tier"
        category:
          type: string
          description: "Industry category, e.g. Machinery, Irrigation, Fertilizers & Inputs, Livestock, Agri-Tech, Finance, Logistics, Security, Services"
        section:
          type: string
          description: "Exhibition section, e.g. Main Pavilion, Machinery Hall, Suppliers Village, Field Zone"
        booth:
          type: string
          description: "Assigned booth number, e.g. A01, B12"
        featured:
          type: boolean
          description: "Whether the exhibitor is highlighted as a featured exhibitor"
        logo_url:
          type: string
          description: "URL to the exhibitor's logo image"
        description:
          type: string
          description: "Company and product description"
        contact_email:
          type: string
          description: "Exhibitor contact email"
        contact_phone:
          type: string
          description: "Exhibitor contact phone number"
        website:
          type: string
          description: "Exhibitor website URL"
        products:
          type: array
          description: "List of products and services offered"
          items:
            type: string

    NewMeetingRequest:
      type: object
      required: [exhibitor_id, exhibitor_name, visitor_name, visitor_email, preferred_date, preferred_time]
      properties:
        exhibitor_id:
          type: string
          description: "The ID of the exhibitor the visitor wants to meet"
        exhibitor_name:
          type: string
          description: "Name of the exhibitor being requested"
        exhibitor_booth:
          type: string
          description: "Booth number of the exhibitor, if known"
        visitor_name:
          type: string
          description: "Full name of the visitor requesting the meeting"
        visitor_email:
          type: string
          format: email
          description: "Email address of the visitor"
        visitor_company:
          type: string
          description: "Company the visitor represents"
        visitor_phone:
          type: string
          description: "Phone number of the visitor"
        preferred_date:
          type: string
          format: date
          description: "Preferred meeting date in YYYY-MM-DD format, within the ADMA Agri Show 2026 event dates"
        preferred_time:
          type: string
          description: "Preferred time slot, e.g. 10:00 or 14:30"
        reason:
          type: string
          description: "Brief description of the meeting purpose"

    MeetingRequest:
      type: object
      properties:
        id:
          type: string
          description: "Unique meeting request ID"
        exhibitor_id:
          type: string
          description: "ID of the exhibitor"
        exhibitor_name:
          type: string
          description: "Name of the exhibitor"
        exhibitor_booth:
          type: string
          description: "Booth number of the exhibitor"
        visitor_name:
          type: string
          description: "Name of the visitor"
        visitor_email:
          type: string
          description: "Email of the visitor"
        visitor_company:
          type: string
          description: "Visitor's company"
        preferred_date:
          type: string
          description: "Requested meeting date"
        preferred_time:
          type: string
          description: "Requested meeting time"
        reason:
          type: string
          description: "Meeting purpose"
        status:
          type: string
          enum: [Pending, Confirmed, Declined, Cancelled]
          description: "Current status of the meeting request"
        created_date:
          type: string
          format: date-time
          description: "Timestamp when the request was created"

    NewVirtualEnquiry:
      type: object
      required: [exhibitor_id, exhibitor_name, name, email, message]
      properties:
        exhibitor_id:
          type: string
          description: "ID of the exhibitor being contacted"
        exhibitor_name:
          type: string
          description: "Name of the exhibitor being contacted"
        name:
          type: string
          description: "Full name of the person sending the enquiry"
        email:
          type: string
          format: email
          description: "Email address of the sender"
        company:
          type: string
          description: "Sender's company"
        phone:
          type: string
          description: "Sender's phone number"
        message:
          type: string
          description: "The enquiry text, e.g. a product question, pricing request, or availability check"

    VirtualEnquiry:
      type: object
      properties:
        id:
          type: string
          description: "Unique enquiry ID"
        exhibitor_id:
          type: string
          description: "ID of the exhibitor"
        exhibitor_name:
          type: string
          description: "Name of the exhibitor"
        name:
          type: string
          description: "Name of the sender"
        email:
          type: string
          description: "Email of the sender"
        message:
          type: string
          description: "Enquiry message body"
        status:
          type: string
          enum: [New, Replied, Closed]
          description: "Current status of the enquiry"
        created_date:
          type: string
          format: date-time
          description: "Timestamp when the enquiry was submitted"

    Registration:
      type: object
      properties:
        id:
          type: string
          description: "Unique registration ID"
        full_name:
          type: string
          description: "Registrant's full name"
        email:
          type: string
          description: "Registrant's email address"
        phone:
          type: string
          description: "Registrant's phone number"
        company:
          type: string
          description: "Registrant's company, if applicable"
        role_type:
          type: string
          enum: [Attendee, Exhibitor, Sponsor, Speaker, "VIP Guest"]
          description: "Role the registrant signed up as"
        ticket_type:
          type: string
          enum: ["General Admission", "VIP (includes parking)", "Exhibitor Pass", "Speaker Pass"]
          description: "Type of ticket purchased"
        badge_category:
          type: string
          enum: [Visitor, Exhibitor, Sponsor, Speaker, VIP]
          description: "Badge category printed on the entry pass"
        exhibitor_tier:
          type: string
          enum: [Platinum, Gold, Silver, Bronze]
          description: "Booth tier, only present when role_type is Exhibitor"
        quantity:
          type: integer
          description: "Number of tickets purchased under this registration"
        status:
          type: string
          enum: [Pending, Confirmed]
          description: "Current status of the registration"
        checked_in:
          type: boolean
          description: "Whether the registrant has checked in at the venue"
        check_in_time:
          type: string
          format: date-time
          description: "Timestamp of check-in, if applicable"

    Announcement:
      type: object
      properties:
        id:
          type: string
          description: "Unique announcement ID"
        title:
          type: string
          description: "Announcement title"
        body:
          type: string
          description: "Full announcement text"
        type:
          type: string
          enum: [General, Important, Update]
          description: "Announcement type"
        pinned:
          type: boolean
          description: "Whether the announcement is pinned to the top of the list"
        created_date:
          type: string
          format: date-time
          description: "Timestamp when the announcement was published"
