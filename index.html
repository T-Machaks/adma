    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#eab308" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ADMA" />

    <meta name="description" content="Zimbabwe's largest agricultural exhibition — ART Farm, Pomona, Harare." />
    <meta name="application-name" content="ADMA Agri Show 2026" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn, iMessage) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://adma.tyflex.co.zw" />
    <meta property="og:site_name"   content="ADMA Agri Show 2026" />
    <meta property="og:title"       content="ADMA Agri Show 2026 — Zimbabwe's Largest Agricultural Exhibition" />
    <meta property="og:description" content="The largest agricultural exhibition in Zimbabwe. ART Farm, Pomona, Harare — 05-07 June 2026. Register, explore exhibitors, and book meetings." />

    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt"   content="ADMA Agri Show 2026 Logo" />

    <meta name="twitter:image"       content="https://adma-zw.s3.af-south-1.amazonaws.com/brand/adma-logo.png" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/adma-favicon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
