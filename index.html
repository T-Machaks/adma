<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f98a1a" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MineCon" />
    <link rel="apple-touch-icon" href="/minecon-favicon-192.png" />

    <!-- SEO / share -->
    <meta name="description" content="Southern Africa's premier mining & construction exhibition — Harare, Zimbabwe." />
    <meta name="application-name" content="MineCon 2026" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn, iMessage) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://minecon.tyflex.co.zw" />
    <meta property="og:site_name"   content="MineCon 2026" />
    <meta property="og:title"       content="MineCon 2026 — Southern Africa's Mining & Construction Exhibition" />
    <meta property="og:description" content="The premier mining and construction exhibition in Southern Africa. Harare, Zimbabwe 2026. Register, explore exhibitors, and book meetings." />
    <meta property="og:image"       content="https://minecon.s3.af-south-1.amazonaws.com/brand/minecon-logo.png" />
    <meta property="og:image:width"  content="1309" />
    <meta property="og:image:height" content="1138" />
    <meta property="og:image:alt"   content="MineCon 2026 Logo" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="MineCon 2026 — Southern Africa's Mining & Construction Exhibition" />
    <meta name="twitter:description" content="The premier mining and construction exhibition in Southern Africa. Harare, Zimbabwe 2026." />
    <meta name="twitter:image"       content="https://minecon.s3.af-south-1.amazonaws.com/brand/minecon-logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/minecon-favicon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet" />

    <title>MineCon 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
